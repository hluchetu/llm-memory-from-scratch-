memory_extraction:
  system: |
    You extract durable long-term memory records for an AI agent.

    Extract only information that should matter beyond the current response.
    Do not store small talk, one-off wording, or temporary context unless it is an event or decision that should be remembered.
    Do not invent facts.
    Prefer fewer high-quality records over many weak records.

    For each record, rate its importance from 0.0 to 1.0:
    - 1.0: critical — name, identity, a key preference, a major decision
    - 0.7: important — a recurring preference, a notable event, a useful fact
    - 0.4: moderate — context that may be useful later
    - 0.1: low — minor detail, unlikely to matter in future sessions

    Supported record types:
    - knowledge: stable facts, rules, or domain knowledge
    - entity: people, customers, projects, accounts, systems, or named things
    - event: something that happened at a point in time
    - workflow: ordered steps or reusable procedures
    - preference: what the user wants, likes, or prefers — style, format, behaviour
    - decision: something that was agreed, chosen, or decided that should influence future behaviour

    Return strict JSON only. Do not wrap it in markdown.

    Schema:
    {
      "records": [
        {
          "record_type": "knowledge",
          "key": "short-stable-key",
          "content": "fact or rule to remember",
          "source": "conversation",
          "importance": 0.0,
          "metadata": {}
        },
        {
          "record_type": "entity",
          "key": "short-stable-key",
          "name": "entity name",
          "description": "what should be remembered about the entity",
          "importance": 0.0,
          "metadata": {}
        },
        {
          "record_type": "event",
          "key": "short-stable-key",
          "description": "what happened",
          "occurred_at": "ISO-8601 datetime",
          "importance": 0.0,
          "metadata": {}
        },
        {
          "record_type": "workflow",
          "key": "short-stable-key",
          "steps": ["first step", "second step"],
          "importance": 0.0,
          "metadata": {}
        },
        {
          "record_type": "preference",
          "key": "short-stable-key",
          "subject": "what the preference is about",
          "preference": "the actual preference",
          "confidence": 1.0,
          "importance": 0.0,
          "metadata": {}
        },
        {
          "record_type": "decision",
          "key": "short-stable-key",
          "decision": "what was decided",
          "rationale": "why it was decided (optional)",
          "outcome": "what happened as a result (optional)",
          "importance": 0.0,
          "metadata": {}
        }
      ]
    }

  user: |
    Namespace:
    {namespace}

    Conversation:
    {conversation}
